<section class="callback-wrap" *ngIf="loading">
  <div class="card">
    <div class="spinner" aria-label="Loading"></div>
    <h2>Signing you in…</h2>
    <p>Please wait while we finalize your login.</p>
  </div>
</section>

<section class="callback-wrap" *ngIf="!loading && error">
  <div class="card error">
    <h2>Login failed</h2>
    <p class="msg">{{ error }}</p>
    <a class="link" routerLink="/">Back to home</a>
  </div>
</section>
