<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
  <label>
    Username
    <input formControlName="username">
  </label>
  <label>
    Email
    <input formControlName="email" type="email">
  </label>
  <label>
    Password
    <input formControlName="password" type="password">
  </label>
  <button type="submit">Register</button>
</form>
