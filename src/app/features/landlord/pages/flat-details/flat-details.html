<app-unit-details-layout
  *ngIf="flat"
  unitType="Flat"
  unitIcon="apartment"
  rootLabel="Buildings"
  [rootRoute]="['/landlord/buildings']"
  parentLabel="Flat"
  [parentRoute]="['/landlord/buildings', flat.buildingId]"
  [title]="'Flat ' + flat.flatNumber"
  [description]="flat.description || 'No description available for this flat.'"
  [images]="flat.images || []"
  [price]="flat.price || 0"
  [status]="flat.rented ? 'Occupied' : 'Available'"
  [tag]="flat.tenantType || 'Residential'"
  [locationTitle]="flat.region + ', ' + flat.wilaya + ', ' + flat.area"
  [locationDetails]="buildLocationDetails()"
  [features]="flatFeatures"
></app-unit-details-layout>
