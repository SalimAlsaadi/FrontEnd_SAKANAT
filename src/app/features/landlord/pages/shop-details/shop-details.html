<app-unit-details-layout
  *ngIf="shop"
  unitType="Shop"
  unitIcon="storefront"
  [title]="'Shop ' + shop.shopNumber"
  [description]="shop.description"
  [images]="shop.pictureUrls"
  [price]="shop.price"
  [status]="shop.isRented ? 'Occupied' : 'Available'"
  [tag]="shop.commercialType"
  [locationTitle]="shop.location"
  [locationDetails]="'Shop ' + shop.shopNumber"
  [features]="shopFeatures"
></app-unit-details-layout>
