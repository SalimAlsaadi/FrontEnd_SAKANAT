<app-unit-details-layout
  *ngIf="room"
  unitType="Room"
  unitIcon="meeting_room"
  [title]="room.location"
  [description]="room.description"
  [images]="room.pictureUrls"
  [price]="room.price"
  [status]="room.isRented ? 'Occupied' : 'Available'"
  [tag]="room.tenantType"
  [locationTitle]="room.region + ', ' + room.wilaya"
  [locationDetails]="room.location"
  [features]="roomFeatures"
></app-unit-details-layout>
